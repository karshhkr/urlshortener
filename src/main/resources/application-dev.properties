spring.datasource.url=jdbc:mysql://localhost:3306/url_shortener?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.pool-name=DevPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.urlshortener=DEBUG
logging.level.org.hibernate.SQL=DEBUG

app.cache.ttl-seconds=60
app.cache.max-size=100