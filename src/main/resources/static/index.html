<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: 'Segoe UI', sans-serif;
          background: #0f0f0f;
          color: #e0e0e0;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 60px 20px;
        }
        h1 { font-size: 2rem; color: #ffffff; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 0.95rem; margin-bottom: 40px; }
        .card {
          background: #1a1a1a;
          border: 1px solid #2a2a2a;
          border-radius: 12px;
          padding: 32px;
          width: 100%;
          max-width: 560px;
          margin-bottom: 24px;
        }
        .card h2 {
          font-size: 1rem; color: #aaa; margin-bottom: 16px;
          text-transform: uppercase; letter-spacing: 1px; font-weight: 500;
        }
        input[type="text"] {
          width: 100%; padding: 12px 16px;
          background: #111; border: 1px solid #333;
          border-radius: 8px; color: #fff;
          font-size: 0.95rem; outline: none;
          margin-bottom: 12px; transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: #555; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; margin-bottom: 0; }
        button {
          padding: 12px 24px; background: #ffffff; color: #000000;
          border: none; border-radius: 8px; font-size: 0.9rem;
          font-weight: 600; cursor: pointer; transition: background 0.2s;
          white-space: nowrap;
        }
        button:hover { background: #ddd; }
        .result-box {
          display: none; margin-top: 20px;
          background: #111; border: 1px solid #2a2a2a;
          border-radius: 8px; padding: 16px;
        }
        .result-box.show { display: block; }
        .result-label { font-size: 0.75rem; color: #666; margin-bottom: 6px; text-transform: uppercase; }
        .result-url { font-size: 1rem; color: #4ade80; word-break: break-all; margin-bottom: 12px; }
        .copy-btn {
          padding: 8px 16px; font-size: 0.8rem;
          background: #1e3a2a; color: #4ade80;
          border: 1px solid #2d5c3f; border-radius: 6px;
          cursor: pointer; font-weight: 500;
        }
        .copy-btn:hover { background: #254d38; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
        .stat-item {
          background: #111; border: 1px solid #2a2a2a;
          border-radius: 8px; padding: 16px;
        }
        .stat-label { font-size: 0.75rem; color: #666; text-transform: uppercase; margin-bottom: 6px; }
        .stat-value { font-size: 1.1rem; color: #fff; font-weight: 500; word-break: break-all; }
        .stat-value.clicks { font-size: 1.8rem; color: #4ade80; }
        .stat-value.active-yes { color: #4ade80; }
        .stat-value.active-no { color: #f87171; }
        .message {
          padding: 10px 14px; border-radius: 8px;
          font-size: 0.875rem; margin-top: 12px; display: none;
        }
        .message.error {
          background: #2a1a1a; border: 1px solid #5c2d2d;
          color: #f87171; display: block;
        }
        .message.success {
          background: #1a2a1a; border: 1px solid #2d5c2d;
          color: #4ade80; display: block;
        }
        .divider { width: 100%; max-width: 560px; border: none; border-top: 1px solid #2a2a2a; margin: 8px 0 24px; }
        .footer { margin-top: 40px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

<h1>URL Shortener</h1>
<p class="subtitle">Shorten long URLs instantly</p>

<div class="card">
    <h2>Shorten a URL</h2>
    <input type="text" id="longUrl" placeholder="https://www.example.com/very/long/url" />
    <div class="row">
        <input type="text" id="customAlias" placeholder="Custom alias (optional)" />
        <input type="text" id="expiryDays" placeholder="Expiry days" style="max-width:130px;" />
    </div>
    <div style="margin-top: 12px;">
        <button onclick="shortenUrl()">Shorten</button>
    </div>
    <div id="shortenMessage" class="message"></div>
    <div id="resultBox" class="result-box">
        <div class="result-label">Your Short URL</div>
        <div id="shortUrlText" class="result-url"></div>
        <button class="copy-btn" onclick="copyUrl()">Copy URL</button>
    </div>
</div>

<hr class="divider" />

<div class="card">
    <h2>Check Stats</h2>
    <div class="row">
        <input type="text" id="statsCode" placeholder="Enter short code e.g. WWgmco" />
        <button onclick="getStats()">Get Stats</button>
    </div>
    <div id="statsMessage" class="message"></div>
    <div id="statsBox" style="display:none; margin-top: 20px;">
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Short Code</div>
                <div class="stat-value" id="statCode">—</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total Clicks</div>
                <div class="stat-value clicks" id="statClicks">0</div>
            </div>
            <div class="stat-item" style="grid-column: span 2;">
                <div class="stat-label">Original URL</div>
                <div class="stat-value" id="statUrl" style="font-size:0.85rem; color:#aaa;">—</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Status</div>
                <div class="stat-value" id="statActive">—</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Expires At</div>
                <div class="stat-value" id="statExpiry" style="font-size:0.85rem;">—</div>
            </div>
        </div>
    </div>
</div>

<p class="footer">Built with Spring Boot + MySQL</p>

<script>
    const BASE = 'http://localhost:8080';

    async function shortenUrl() {
      const url = document.getElementById('longUrl').value.trim();
      const alias = document.getElementById('customAlias').value.trim();
      const expiry = document.getElementById('expiryDays').value.trim();
      const msgBox = document.getElementById('shortenMessage');
      const resultBox = document.getElementById('resultBox');

      msgBox.className = 'message';
      msgBox.textContent = '';
      resultBox.classList.remove('show');

      if (!url) {
        msgBox.className = 'message error';
        msgBox.textContent = 'Please enter a URL.';
        return;
      }

      const body = { url };
      if (alias) body.customAlias = alias;
      if (expiry) body.expiryDays = parseInt(expiry);

      try {
        const res = await fetch(`${BASE}/api/shorten`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('shortUrlText').textContent = data.shortUrl;
          resultBox.classList.add('show');
        } else {
          msgBox.className = 'message error';
          msgBox.textContent = data.message || 'Something went wrong.';
        }
      } catch (e) {
        msgBox.className = 'message error';
        msgBox.textContent = 'Cannot connect to server.';
      }
    }

    async function getStats() {
      const code = document.getElementById('statsCode').value.trim();
      const msgBox = document.getElementById('statsMessage');
      const statsBox = document.getElementById('statsBox');

      msgBox.className = 'message';
      msgBox.textContent = '';
      statsBox.style.display = 'none';

      if (!code) {
        msgBox.className = 'message error';
        msgBox.textContent = 'Please enter a short code.';
        return;
      }

      try {
        const res = await fetch(`${BASE}/api/stats/${code}`);
        const data = await res.json();
        if (res.ok) {
          document.getElementById('statCode').textContent = data.shortCode;
          document.getElementById('statClicks').textContent = data.clickCount;
          document.getElementById('statUrl').textContent = data.originalUrl;
          const activeEl = document.getElementById('statActive');
          activeEl.textContent = data.isActive ? 'Active' : 'Inactive';
          activeEl.className = 'stat-value ' + (data.isActive ? 'active-yes' : 'active-no');
          const expiry = data.expiresAt ? new Date(data.expiresAt).toLocaleDateString() : 'Never';
          document.getElementById('statExpiry').textContent = expiry;
          statsBox.style.display = 'block';
        } else {
          msgBox.className = 'message error';
          msgBox.textContent = data.message || 'Short code not found.';
        }
      } catch (e) {
        msgBox.className = 'message error';
        msgBox.textContent = 'Cannot connect to server.';
      }
    }

    function copyUrl() {
      const url = document.getElementById('shortUrlText').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy URL', 2000);
      });
    }

    document.getElementById('longUrl').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });
    document.getElementById('statsCode').addEventListener('keydown', e => {
      if (e.key === 'Enter') getStats();
    });
</script>
</body>
</html>
