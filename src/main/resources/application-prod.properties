# Datasource (prod - use env vars, never hardcode)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=${PORT:8080}

# HikariCP pool (tuned for production)
spring.datasource.hikari.pool-name=ProdPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA (no SQL logs in prod)
spring.jpa.show-sql=false

# Logging
logging.level.com.urlshortener=INFO
logging.level.root=WARN

logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Cache (longer TTL for prod)
app.cache.ttl-seconds=3600
app.cache.max-size=10000

# Actuator - restrict in prod
management.endpoints.web.exposure.include=health,info
